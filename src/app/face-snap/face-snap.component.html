<div class="flex items-center justify-center h-full">
  <div
    class="flex flex-col gap-3 m-4 bg-white w-96 h-full p-6 border border-purple-200 rounded-md shadow-sm hover:bg-purple-50 transition-all"
  >
    <h2 class="text-2xl font-semibold tracking-tight text-purple-700 leading-8 line-clamp-2 min-h-[4rem]">
      {{ faceSnap().title | uppercase }}
    </h2>

    <div class="min-h-[1.25rem]">
      @if (faceSnap().location) {
        <p class="text-gray-500 text-sm">📍 {{ faceSnap().location }}</p>
      } @else {
        <p class="text-gray-400 text-sm italic">Localisation non spécifiée</p>
      }
    </div>

    <div class="h-56 w-full flex-shrink-0 overflow-hidden rounded-md">
      <img
        class="h-full w-full object-cover rounded-lg"
        [src]="faceSnap().imageUrl"
        [alt]="faceSnap().title"
      />
    </div>

    <button (click)="onViewFaceSnap()" class="bg-gray-200 p-3 rounded-md text-sm font-semibold text-purple-600 hover:translate-x-1 hover:shadow-md hover:bg-purple-200">View</button>

  </div>
</div>
