<div class="flex items-center justify-center">
  <div
    class="flex flex-col gap-3 m-8 bg-neutral-primary-soft block max-w-sm p-6 border border-default rounded-md shadow-sm hover:bg-neutral-secondary-medium"
  >
    <h2
      class="mb-3 text-2xl font-semibold tracking-tight text-heading leading-8"
    >
      {{ faceSnap().title }}
    </h2>
    <!-- * C'est le string interpolation -->
    <div class="h-48 w-full overflow-hidden rounded-md">
      <img
        class="h-full w-full object-cover rounded-lg"
        [src]="faceSnap().imageUrl"
        [alt]="faceSnap().title"
      />
    </div>

    <!-- * C'est ce qu'on appelle l'attribut binding -->
    <p class="text-body">{{ faceSnap().description }}</p>
    <p class="text-body">FaceSnap crée le {{ faceSnap().createdAt }}</p>

    <div class="flex justify-end items-end mt-auto pt-4 w-full">
      <p-button (onClick)="onSnap()" > {{ snapButtonText }} </p-button>
      <span class="text-body">❤️ {{ faceSnap().snaps }}</span>
    </div>
  </div>
</div>
